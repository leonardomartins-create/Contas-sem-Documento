<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contas sem Documento - KYC</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding: 20px; }
        .card { border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .table-container { background: white; border-radius: 10px; padding: 20px; }
        .btn-link-custom { text-decoration: none; font-weight: bold; color: #0d6efd; }
    </style>
</head>
<body>

<div class="container">
    <div class="card p-4 mb-4">
        <h2 class="text-center text-primary">📑 Relatório: Contas sem Documento</h2>
        <p class="text-center text-muted">Lista filtrada por Saldo e Natureza Jurídica</p>
    </div>

    <div class="table-container">
        <table class="table table-hover">
            <thead class="table-dark">
                <tr>
                    <th>Data Criação</th>
                    <th>Natureza Jurídica</th>
                    <th>Saldo</th>
                    <th>Ação</th>
                </tr>
            </thead>
            <tbody id="tabela-corpo">
                </tbody>
        </table>
    </div>
</div>

<script>
    const csvUrl = 'dados.csv';

    function formatarMoeda(valor) {
        return parseFloat(valor).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    function converterData(dataStr) {
        // Assume formato dd/mm/yyyy
        const partes = dataStr.split('/');
        return new Date(partes[2], partes[1] - 1, partes[0]);
    }

    Papa.parse(csvUrl, {
        download: true,
        header: true,
        complete: function(results) {
            let dados = results.data.filter(row => row.data_criacao); // Remove linhas vazias

            // Ordenação: Mais recente para a mais antiga
            dados.sort((a, b) => converterData(b.data_criacao) - converterData(a.data_criacao));

            const corpo = document.getElementById('tabela-corpo');
            corpo.innerHTML = '';

            dados.forEach(row => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${row.data_criacao}</td>
                    <td><span class="badge bg-secondary">${row.natureza_juridica}</span></td>
                    <td class="fw-bold">${formatarMoeda(row.saldo)}</td>
                    <td>
                        <a href="${row.link_customer}" target="_blank" class="btn btn-sm btn-outline-primary">
                            Abrir Cadastro 🔗
                        </a>
                    </td>
                `;
                corpo.appendChild(tr);
            });
        }
    });
</script>

</body>
</html>
